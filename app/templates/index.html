<!DOCTYPE html>
<html>

<head>

    <title>Event Planner</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body class="container mt-5">

<h1>Event Planner</h1>

<a href="/add" class="btn btn-primary mb-3">
Add Event
</a>

<table class="table table-striped">

<thead>

<tr>

<th>Title</th>
<th>Date</th>
<th>Priority</th>

</tr>

</thead>

<tbody>

{% for event in events %}

<tr>

<td>{{ event.title }}</td>
<td>{{ event.date }}</td>
<td>{{ event.priority }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</body>

</html>
